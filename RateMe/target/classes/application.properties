spring.datasource.url=jdbc:mysql://localhost:3307/rateme?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ratemeuser
spring.datasource.password=ratemepass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
