version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: rateme-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: rateme
      MYSQL_USER: ratemeuser
      MYSQL_PASSWORD: ratemepass
    ports:
      - "3307:3306"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql-data: